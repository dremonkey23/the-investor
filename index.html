<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Investor — Live Portfolio</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; color: #e0e0e0; font-family: 'SF Pro Display', 'Segoe UI', system-ui, sans-serif; }
    .container { max-width: 1200px; margin: 0 auto; padding: 24px 20px; }
    
    .header { text-align: center; padding: 30px 0 20px; }
    .header h1 { font-size: 1.8rem; font-weight: 700; color: #fff; }
    .header h1 span { color: #00ff88; }
    .header .tagline { color: #666; font-size: 0.85rem; margin-top: 4px; }
    .header .live-dot { display: inline-block; width: 8px; height: 8px; background: #00ff88; border-radius: 50%; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
    
    .portfolio-bar { display: flex; justify-content: space-between; align-items: center; background: #111; border: 1px solid #1a1a1a; border-radius: 12px; padding: 20px 24px; margin-bottom: 24px; flex-wrap: wrap; gap: 16px; }
    .port-item { text-align: center; }
    .port-label { font-size: 0.7rem; color: #666; text-transform: uppercase; letter-spacing: 1px; }
    .port-value { font-size: 1.5rem; font-weight: 700; margin-top: 2px; }
    .port-value.green { color: #00ff88; }
    .port-value.red { color: #ff4444; }
    .port-value.white { color: #fff; }
    
    /* Pie Chart Section */
    .chart-section { display: flex; gap: 24px; margin-bottom: 24px; flex-wrap: wrap; }
    .pie-container { background: #111; border: 1px solid #1a1a1a; border-radius: 12px; padding: 20px; flex: 1; min-width: 300px; display: flex; align-items: center; justify-content: center; gap: 24px; }
    .pie-canvas { width: 220px; height: 220px; }
    .pie-legend { display: flex; flex-direction: column; gap: 6px; }
    .legend-item { display: flex; align-items: center; gap: 8px; font-size: 0.8rem; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .legend-ticker { font-weight: 700; color: #fff; width: 45px; }
    .legend-pct { color: #888; }
    
    .main-grid { display: grid; grid-template-columns: 1fr 340px; gap: 24px; }
    @media (max-width: 900px) { .main-grid { grid-template-columns: 1fr; } }
    
    .section-title { font-size: 0.85rem; font-weight: 700; color: #fff; margin-bottom: 12px; border-bottom: 1px solid #1a1a1a; padding-bottom: 8px; }
    
    .plays { display: flex; flex-direction: column; gap: 8px; }
    .play { display: flex; align-items: center; background: #111; border: 1px solid #1a1a1a; border-radius: 10px; padding: 14px 18px; transition: background 0.15s; }
    .play:hover { background: #151518; }
    .play-left { flex: 1; }
    .play-ticker { font-size: 1rem; font-weight: 700; color: #fff; }
    .play-ticker .qty-tag { font-size: 0.7rem; font-weight: 600; color: #888; margin-left: 8px; }
    .play-meta { font-size: 0.75rem; color: #555; margin-top: 3px; }
    .play-right { text-align: right; }
    .play-pnl { font-size: 1.1rem; font-weight: 700; }
    .play-pnl.green { color: #00ff88; }
    .play-pnl.red { color: #ff4444; }
    .play-pnl.flat { color: #555; }
    .play-prices { font-size: 0.7rem; color: #555; margin-top: 2px; }
    .play-value { font-size: 0.75rem; color: #888; }
    
    .empty { text-align: center; padding: 60px 20px; color: #444; }
    .empty .emoji { font-size: 2rem; margin-bottom: 12px; }
    
    /* History Panel */
    .history-panel { background: #111; border: 1px solid #1a1a1a; border-radius: 12px; padding: 18px; height: fit-content; position: sticky; top: 24px; }
    .history-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #0f0f0f; }
    .history-item:last-child { border-bottom: none; }
    .hi-action { font-size: 0.65rem; font-weight: 700; padding: 2px 6px; border-radius: 3px; display: inline-block; margin-right: 6px; }
    .hi-buy { background: #0a2a0a; color: #00ff88; }
    .hi-sell { background: #2a0a0a; color: #ff4444; }
    .hi-ticker { font-size: 0.85rem; font-weight: 600; color: #fff; }
    .hi-qty { font-size: 0.7rem; color: #666; margin-left: 4px; }
    .hi-date { font-size: 0.65rem; color: #555; margin-top: 2px; }
    .hi-price { font-size: 0.85rem; font-weight: 600; color: #ccc; text-align: right; }
    .history-empty { color: #444; font-size: 0.8rem; text-align: center; padding: 20px 0; }
    
    .footer { text-align: center; padding: 30px 0 20px; color: #ccc; font-size: 0.7rem; }
    .footer span { color: #ff3333; }
    .updated { text-align: center; color: #aaa; font-size: 0.7rem; margin-top: 16px; }
    
    @media (max-width: 600px) {
      .portfolio-bar { flex-direction: column; text-align: center; gap: 12px; }
      .pie-container { flex-direction: column; }
      .play { flex-direction: column; text-align: center; gap: 8px; }
      .play-right { text-align: center; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📈 The <span>Investor</span></h1>
      <div class="tagline"><span class="live-dot"></span> Live portfolio • Real trades • Full transparency</div>
    </div>
    
    <div class="portfolio-bar">
      <div class="port-item">
        <div class="port-label">Portfolio Value</div>
        <div class="port-value white" id="port-val">$100,000</div>
      </div>
      <div class="port-item">
        <div class="port-label">Cash</div>
        <div class="port-value white" id="cash-val">$100,000</div>
      </div>
      <div class="port-item">
        <div class="port-label">Invested</div>
        <div class="port-value white" id="invested-val">$0</div>
      </div>
      <div class="port-item">
        <div class="port-label">Total P&L</div>
        <div class="port-value green" id="pnl-val">$0.00</div>
      </div>
      <div class="port-item">
        <div class="port-label">Return</div>
        <div class="port-value green" id="return-val">0.00%</div>
      </div>
      <div class="port-item">
        <div class="port-label">Positions</div>
        <div class="port-value white" id="positions-val">0</div>
      </div>
    </div>
    
    <!-- Pie Chart -->
    <div class="chart-section">
      <div class="pie-container">
        <canvas id="pie-chart" class="pie-canvas" width="220" height="220"></canvas>
        <div class="pie-legend" id="pie-legend"></div>
      </div>
    </div>
    
    <div class="main-grid">
      <div class="left-col">
        <div class="section-title">📊 Active Positions</div>
        <div class="plays" id="positions-list">
          <div class="empty"><div class="emoji">🎯</div><div>No positions yet</div></div>
        </div>
      </div>
      
      <div class="history-panel">
        <div class="section-title">📜 Trade History</div>
        <div id="history-list">
          <div class="history-empty">No trades yet</div>
        </div>
      </div>
    </div>
    
    <div class="updated" id="updated"></div>
    <div class="footer">Powered by The One <span>🔴</span> • AI-managed portfolio • Not financial advice</div>
  </div>

  <script>
    const PIE_COLORS = [
      '#00ff88', '#3b82f6', '#f59e0b', '#ef4444', '#8b5cf6',
      '#ec4899', '#06b6d4', '#84cc16', '#f97316', '#6366f1',
      '#14b8a6', '#e879f9', '#22d3ee', '#a3e635', '#fb923c',
      '#818cf8', '#2dd4bf', '#c084fc'
    ];
    
    function fmt(n) { return n.toLocaleString('en-US', { style: 'currency', currency: 'USD' }); }
    function fmtPct(n) { return (n >= 0 ? '+' : '') + n.toFixed(2) + '%'; }
    
    function drawPieChart(positions, cash) {
      const canvas = document.getElementById('pie-chart');
      const ctx = canvas.getContext('2d');
      const cx = 110, cy = 110, r = 100;
      
      ctx.clearRect(0, 0, 220, 220);
      
      // Build slices: positions + cash
      const slices = positions.map(p => ({
        label: p.symbol,
        value: Math.abs(p.marketValue),
        pnlPct: p.unrealizedPnlPct
      }));
      if (cash > 0) slices.push({ label: 'CASH', value: cash, pnlPct: null });
      
      const total = slices.reduce((s, sl) => s + sl.value, 0);
      if (total === 0) return;
      
      let startAngle = -Math.PI / 2;
      const legendEl = document.getElementById('pie-legend');
      legendEl.innerHTML = '';
      
      slices.sort((a, b) => b.value - a.value);
      
      slices.forEach((sl, i) => {
        const pct = sl.value / total;
        const sliceAngle = pct * 2 * Math.PI;
        const color = sl.label === 'CASH' ? '#333' : PIE_COLORS[i % PIE_COLORS.length];
        
        // Draw slice
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, r, startAngle, startAngle + sliceAngle);
        ctx.closePath();
        ctx.fillStyle = color;
        ctx.fill();
        
        // Thin border
        ctx.strokeStyle = '#0a0a0a';
        ctx.lineWidth = 2;
        ctx.stroke();
        
        // Label on slice if big enough
        if (pct > 0.05) {
          const midAngle = startAngle + sliceAngle / 2;
          const lx = cx + Math.cos(midAngle) * (r * 0.65);
          const ly = cy + Math.sin(midAngle) * (r * 0.65);
          ctx.fillStyle = '#000';
          ctx.font = 'bold 11px system-ui';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(sl.label, lx, ly);
        }
        
        // Legend
        const pnlText = sl.pnlPct != null ? ` (${sl.pnlPct >= 0 ? '+' : ''}${sl.pnlPct.toFixed(1)}%)` : '';
        legendEl.innerHTML += `<div class="legend-item">
          <div class="legend-dot" style="background:${color}"></div>
          <span class="legend-ticker">${sl.label}</span>
          <span class="legend-pct">${(pct * 100).toFixed(1)}%${pnlText}</span>
        </div>`;
        
        startAngle += sliceAngle;
      });
    }
    
    async function loadData() {
      try {
        const res = await fetch('alpaca-data.json?t=' + Date.now());
        const data = await res.json();
        const a = data.account;
        
        document.getElementById('port-val').textContent = fmt(a.portfolioValue);
        document.getElementById('cash-val').textContent = fmt(a.cash);
        document.getElementById('invested-val').textContent = fmt(a.longMarketValue);
        
        const pnlEl = document.getElementById('pnl-val');
        pnlEl.textContent = (a.pnl >= 0 ? '+' : '') + fmt(a.pnl);
        pnlEl.className = 'port-value ' + (a.pnl >= 0 ? 'green' : 'red');
        
        const retEl = document.getElementById('return-val');
        retEl.textContent = fmtPct(a.pnlPct);
        retEl.className = 'port-value ' + (a.pnlPct >= 0 ? 'green' : 'red');
        
        document.getElementById('positions-val').textContent = data.positions.length;
        
        // Pie chart
        drawPieChart(data.positions, Math.max(a.cash, 0));
        
        // Positions list
        const posEl = document.getElementById('positions-list');
        if (data.positions.length) {
          const sorted = [...data.positions].sort((a, b) => Math.abs(b.marketValue) - Math.abs(a.marketValue));
          posEl.innerHTML = sorted.map(p => {
            const pnlClass = p.unrealizedPnlPct > 0 ? 'green' : p.unrealizedPnlPct < 0 ? 'red' : 'flat';
            return `<div class="play">
              <div class="play-left">
                <div class="play-ticker">${p.symbol}<span class="qty-tag">${p.qty} shares</span></div>
                <div class="play-meta">Avg entry: ${fmt(p.avgEntry)} · Today: ${p.change >= 0 ? '+' : ''}${p.change.toFixed(2)}%</div>
              </div>
              <div class="play-right">
                <div class="play-pnl ${pnlClass}">${fmtPct(p.unrealizedPnlPct)}</div>
                <div class="play-prices">${fmt(p.avgEntry)} → ${fmt(p.currentPrice)}</div>
                <div class="play-value">${fmt(p.marketValue)}</div>
              </div>
            </div>`;
          }).join('');
        }
        
        // Trade history
        const histEl = document.getElementById('history-list');
        if (data.history && data.history.length) {
          histEl.innerHTML = data.history.slice(0, 30).map(h => {
            const isBuy = h.action === 'BUY';
            return `<div class="history-item">
              <div>
                <div><span class="hi-action ${isBuy ? 'hi-buy' : 'hi-sell'}">${h.action}</span><span class="hi-ticker">${h.ticker}</span><span class="hi-qty">×${h.qty}</span></div>
                <div class="hi-date">${h.date}</div>
              </div>
              <div>
                <div class="hi-price">${fmt(h.price)}</div>
              </div>
            </div>`;
          }).join('');
        }
        
        if (data.metadata?.lastUpdated) {
          document.getElementById('updated').textContent = 'Last updated: ' + new Date(data.metadata.lastUpdated).toLocaleString();
        }
      } catch (e) { console.log('Load error:', e); }
    }
    
    loadData();
    setInterval(loadData, 60000);
  </script>
</body>
</html>
